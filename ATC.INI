; ============================================================================
; ATC PANEL CONFIGURATION — Aircraft.ini Section
; Based on RMP configuration structure, adapted for ATC Panel
; ============================================================================

; --- INPUT MAPPING ---
; IN1: 8-bit from 1st HC165 shift register — Mode/Data keys
; IN2: 8-bit from 2nd HC165 shift register — Numeric keypad 0-7
; IN3: 7-bit from direct pins — Control keys (bit 7 always 0)

; --- BUTTON MAPPING (IN1 - Mode/Data keys, MSB first) ---
in1-b7 = L:S_PED_ATC_THRT
in1-b6 = L:S_PED_ATC_STBY_MODE
in1-b5 = L:S_PED_ATC_TA
in1-b4 = L:S_PED_ATC_TARA
in1-b3 = L:S_PED_ATC_ON_MODE
in1-b2 = L:S_PED_ATC_BLW
in1-b1 = L:S_PED_ATC_ABV
in1-b0 = L:S_PED_ATC_ALL

; --- BUTTON MAPPING (IN2 - Numeric keypad) ---
in2-b7 = L:S_PED_ATC_KEY_7
in2-b6 = L:S_PED_ATC_KEY_6
in2-b5 = L:S_PED_ATC_KEY_5
in2-b4 = L:S_PED_ATC_KEY_4
in2-b3 = L:S_PED_ATC_KEY_3
in2-b2 = L:S_PED_ATC_KEY_2
in2-b1 = L:S_PED_ATC_KEY_1
in2-b0 = L:S_PED_ATC_KEY_0

; --- BUTTON MAPPING (IN3 - Direct Pins) ---
in3-b6 = L:S_PED_ATC_STBY
in3-b5 = L:S_PED_ATC_CLR
in3-b4 = L:S_PED_ATC_AUTO
in3-b3 = L:S_PED_ATC_IDENT
in3-b2 = L:S_PED_ATC_SYS1
in3-b1 = L:S_PED_ATC_SYS2
in3-b0 = L:S_PED_ATC_ON

; --- DISPLAY OUTPUT ---
dsp1 = L:N_PED_ATC_XPDR_CODE
dsp1.modifier = /1

; --- LED OUTPUT ---
; LED1 = Backlight shift register (8 bits, matches IN1 bit order)
led_led1_b0 = L:I_PED_ATC_ALL
led_led1_b1 = L:I_PED_ATC_ABV
led_led1_b2 = L:I_PED_ATC_BLW
led_led1_b3 = L:I_PED_ATC_ON_MODE
led_led1_b4 = L:I_PED_ATC_TARA
led_led1_b5 = L:I_PED_ATC_TA
led_led1_b6 = L:I_PED_ATC_STBY_MODE
led_led1_b7 = L:I_PED_ATC_THRT

; LED2 bit 0 = ATC FAIL (direct LED)
led_led2_b0 = L:I_PED_ATC_FAIL

; LED2 bit 0 = ATC FAIL (direct LED)
led_led2_b0 = L:I_PED_ATC_FAIL

; --- BRIGHTNESS ---
; BL = backlight PWM (0-255)
; DISP_BL = display brightness (0-15)

; --- STATE CONTROL ---
; STATE:01 = online, STATE:00 = offline
